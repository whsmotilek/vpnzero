<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0088ff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)"/>

  <!-- Shield shape -->
  <path d="M256 100 L370 160 L370 280 C370 340 320 390 256 420 C192 390 142 340 142 280 L142 160 Z"
        fill="none" stroke="url(#accent)" stroke-width="8" stroke-linejoin="round"/>

  <!-- Inner shield accent line -->
  <path d="M256 140 L340 185 L340 275 C340 322 302 360 256 382 C210 360 172 322 172 275 L172 185 Z"
        fill="url(#accent)" opacity="0.08"/>

  <!-- Lock/key icon inside shield -->
  <circle cx="256" cy="235" r="28" fill="none" stroke="url(#accent)" stroke-width="7"/>
  <rect x="234" y="255" width="44" height="40" rx="8" fill="url(#accent)"/>
  <circle cx="256" cy="273" r="6" fill="#0a0a0a"/>
  <rect x="253" y="273" width="6" height="14" rx="3" fill="#0a0a0a"/>

  <!-- ZERO text -->
  <text x="256" y="465" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="48" font-weight="800" letter-spacing="8" fill="url(#accent)">ZERO</text>
</svg>
